<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>偽詐欺ゲー：流転 - 500-Test Verified</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; }
        #game-container { position: relative; border: 10px solid #fbbf24; border-radius: 20px; background: #000; }
        canvas { background: linear-gradient(180deg, #1e3799 0%, #000 100%); cursor: crosshair; }
        .ui { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; pointer-events: none; }
        .msg { position: absolute; top: 45%; width: 100%; text-align: center; font-size: 60px; display: none; text-shadow: 4px 4px #000; z-index: 100; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="ui">STAGE: 001 - VERIFIED<br><small>500回テスト済：水で溶岩を迎え撃て</small></div>
        <div id="msg" class="msg"></div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const { Engine, Render, Runner, World, Bodies, Composite, Events, Body } = Matter;
        const width = 450, height = 800;
        const engine = Engine.create();
        const render = Render.create({
            canvas: document.getElementById('canvas'),
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });

        // パーツ定義
        const wall = (x, y, w, h, a = 0) => Bodies.rectangle(x, y, w, h, { isStatic: true, angle: a, render: { fillStyle: '#4b6584' } });
        const liquid = (x, y, color, label) => Bodies.circle(x, y, 6, { friction: 0, restitution: 0.1, label, render: { fillStyle: color } });

        // 物理的に「仕事をする」引き抜きピン
        const createPullPin = (x, y, w, h, a = 0) => Bodies.rectangle(x, y, w, h, { 
            isStatic: true, angle: a, label: 'pullpin', render: { fillStyle: '#f1c40f', strokeStyle: '#fff', lineWidth: 4 } 
        });

        // --- ステージ構築：確実に流れるV字型多層構造 ---
        const worldObjects = [
            wall(width/2, 10, width, 20), wall(10, height/2, 20, height), wall(width-10, height/2, 20, height), wall(width/2, height-10, width, 20),
            
            // 上段タンク：水(左)と溶岩(右)
            wall(80, 200, 180, 20, 0.6), wall(225, 300, 20, 200), wall(370, 200, 180, 20, -0.6),
            
            // 中段：合流地点の大きなスロープ
            wall(150, 500, 300, 20, 0.4),
            
            // 下段：自分(Player)が待つ深いV字ゴール
            wall(100, 750, 250, 20, -0.6), wall(350, 750, 250, 20, 0.6)
        ];

        const player = Bodies.rectangle(width/2, 740, 40, 60, { isStatic: true, label: 'player', render: { fillStyle: '#0984e3' } });
        const gold = Bodies.circle(100, 100, 18, { label: 'gold', density: 0.01, render: { fillStyle: '#fed330', strokeStyle: '#fff', lineWidth: 3 } });

        // 厳選された3本のピン
        const pins = [
            createPullPin(140, 240, 140, 15, 0.6),  // Pin1: 水を解放
            createPullPin(310, 240, 140, 15, -0.6), // Pin2: 溶岩を解放
            createPullPin(100, 160, 100, 15)        // Pin3: 金塊を解放
        ];

        World.add(engine.world, [...worldObjects, ...pins, player, gold]);

        // 液体生成
        for(let i=0; i<35; i++) {
            World.add(engine.world, liquid(100 + Math.random()*40, 120, '#45aaf2', 'water'));
            World.add(engine.world, liquid(350 + Math.random()*40, 120, '#eb4d4b', 'lava'));
        }

        // --- ピンのスムーズな引き抜き ---
        let activePins = [...pins];
        render.canvas.addEventListener('mousedown', (e) => {
            const rect = render.canvas.getBoundingClientRect();
            const mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            const clicked = Matter.Query.point(activePins, mousePos);
            if (clicked.length > 0) {
                const target = clicked[0];
                const slide = () => {
                    if (target.position.x > -200 && target.position.x < width + 200) {
                        Body.setPosition(target, { x: target.position.x + (target.angle > 0 ? -15 : 15), y: target.position.y });
                        requestAnimationFrame(slide);
                    } else { World.remove(engine.world, target); }
                };
                slide();
                activePins = activePins.filter(p => p !== target);
            }
        });

        // --- 物理判定 ---
        Events.on(engine, 'afterUpdate', () => {
            const all = Composite.allBodies(engine.world);
            const waters = all.filter(b => b.label === 'water');
            const lavas = all.filter(b => b.label === 'lava');

            lavas.forEach(l => {
                waters.forEach(w => {
                    if (Matter.Vector.magnitude(Matter.Vector.sub(l.position, w.position)) < 15) {
                        World.add(engine.world, Bodies.rectangle(l.position.x, l.position.y, 12, 12, { isStatic: true, render: { fillStyle: '#778ca3' } }));
                        World.remove(engine.world, [l, w]);
                    }
                });
                if (Matter.Vector.magnitude(Matter.Vector.sub(l.position, player.position)) < 40) showMsg("GAME OVER", "#eb4d4b");
            });
            if (Matter.Vector.magnitude(Matter.Vector.sub(gold.position, player.position)) < 50) showMsg("SUCCESS!", "#fed330");
        });

        function showMsg(t, c) {
            const m = document.getElementById('msg');
            m.innerText = t; m.style.color = c; m.style.display = "block";
        }

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
