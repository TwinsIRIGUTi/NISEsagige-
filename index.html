<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>偽詐欺ゲー：流転 - Professional Pin Mechanics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; border: 10px solid #fbbf24; border-radius: 20px; box-shadow: 0 0 30px #000; }
        canvas { background: #2d3436; cursor: crosshair; }
        .ui-text { position: absolute; top: 10px; width: 100%; text-align: center; color: gold; font-family: 'Arial Black'; font-size: 24px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="ui-text">STAGE: RESEARCHED</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const { Engine, Render, Runner, World, Bodies, Composite, Events, Body } = Matter;

        const width = 450, height = 800;
        const engine = Engine.create();
        const render = Render.create({
            canvas: document.getElementById('canvas'),
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });

        // --- 物理パーツ ---
        const wall = (x, y, w, h, a = 0) => Bodies.rectangle(x, y, w, h, { isStatic: true, angle: a, render: { fillStyle: '#636e72' } });
        const liquid = (x, y, color, label) => Bodies.circle(x, y, 7, { friction: 0, restitution: 0.2, label, render: { fillStyle: color } });

        // ピンを「動かせる実体」として作成
        const createPullPin = (x, y, w, h, name) => {
            return Bodies.rectangle(x, y, w, h, { 
                isStatic: true, label: 'pullpin', name,
                render: { fillStyle: '#f1c40f', strokeStyle: '#d35400', lineWidth: 4 }
            });
        };

        // --- レイアウト：V字タンクとスライドピン ---
        const worldObjects = [
            wall(width/2, 10, width, 20), wall(10, height/2, 20, height), wall(width-10, height/2, 20, height), wall(width/2, height-10, width, 20),
            // V字構造
            wall(100, 200, 250, 20, 0.8), wall(350, 200, 250, 20, -0.8),
            // 下の受け皿
            wall(width/2, 650, 200, 20)
        ];

        // 仕事をするピン（スライド式）
        const pins = [
            createPullPin(width/2, 280, 180, 15, 'main_pin'), // V字の底を塞ぐ
            createPullPin(150, 500, 150, 15, 'trap_pin')      // 横の流路
        ];

        const player = Bodies.rectangle(width/2, 720, 50, 80, { isStatic: true, label: 'player', render: { fillStyle: '#0984e3' } });

        World.add(engine.world, [...worldObjects, ...pins, player]);

        // 液体投入（たっぷり）
        for(let i=0; i<40; i++) {
            World.add(engine.world, liquid(width/2 - 30 + Math.random()*60, 100, '#e74c3c', 'lava'));
            World.add(engine.world, liquid(width/2 - 20 + Math.random()*40, 150, '#3498db', 'water'));
        }

        // --- インタラクション（引き抜きアニメーション） ---
        let activePins = [...pins];
        render.canvas.addEventListener('mousedown', (e) => {
            const rect = render.canvas.getBoundingClientRect();
            const mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            const clicked = Matter.Query.point(activePins, mousePos);
            
            if (clicked.length > 0) {
                const targetPin = clicked[0];
                // 「ススッ」と右にスライドして消えるアニメーション
                const slide = () => {
                    if (targetPin.position.x < width + 200) {
                        Body.setPosition(targetPin, { x: targetPin.position.x + 15, y: targetPin.position.y });
                        requestAnimationFrame(slide);
                    } else {
                        World.remove(engine.world, targetPin);
                    }
                };
                slide();
                activePins = activePins.filter(p => p !== targetPin);
            }
        });

        // 衝突ロジック（水+溶岩=岩）
        Events.on(engine, 'afterUpdate', () => {
            const all = Composite.allBodies(engine.world);
            const waters = all.filter(b => b.label === 'water');
            const lavas = all.filter(b => b.label === 'lava');

            lavas.forEach(l => {
                waters.forEach(w => {
                    if (Matter.Vector.magnitude(Matter.Vector.sub(l.position, w.position)) < 15) {
                        World.add(engine.world, wall(l.position.x, l.position.y, 20, 20));
                        World.remove(engine.world, [l, w]);
                    }
                });
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
