<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>偽詐欺ゲー：流転 - Real Pin Puzzle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; border: 8px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .stage-text { color: #fff; font-size: 32px; -webkit-text-stroke: 1px #000; text-shadow: 2px 2px #f39c12; }
        .msg { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 50px; color: #ff0; display: none; z-index: 100; text-shadow: 4px 4px #000; }
        canvas { background: linear-gradient(180deg, #2c3e50 0%, #000000 100%); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div class="stage-text">STAGE: TEST PLAY</div>
            <button style="pointer-events: auto; cursor: pointer;" onclick="location.reload()">RETRY</button>
        </div>
        <div id="msg" class="msg">SUCCESS!</div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const { Engine, Render, Runner, World, Bodies, Composite, Events } = Matter;

        const width = 400;
        const height = 700;
        const engine = Engine.create();
        const render = Render.create({
            canvas: document.getElementById('canvas'),
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });

        // --- 詐欺ゲー風パーツ作成関数 ---
        const createWall = (x, y, w, h) => Bodies.rectangle(x, y, w, h, { isStatic: true, render: { fillStyle: '#555' } });
        
        const createLiquid = (x, y, color, label) => Bodies.circle(x, y, 7, {
            friction: 0.05, density: 0.001, label, render: { fillStyle: color }
        });

        const createPin = (x, y, w, h) => {
            const p = Bodies.rectangle(x, y, w, h, { isStatic: true, label: 'pin', render: { fillStyle: '#f1c40f', strokeStyle: '#fff', lineWidth: 2 } });
            return p;
        };

        // --- ステージ構築 ---
        const walls = [
            createWall(200, 10, 400, 20),   // 天井
            createWall(10, 350, 20, 700),  // 左壁
            createWall(390, 350, 20, 700), // 右壁
            createWall(200, 690, 400, 20), // 床
            // 仕切り
            createWall(100, 150, 200, 20), 
            createWall(300, 300, 200, 20),
            createWall(100, 450, 200, 20),
        ];

        // 自分(Player)と敵(Enemy)
        const player = Bodies.rectangle(300, 620, 40, 60, { isStatic: true, label: 'player', render: { fillStyle: '#3498db' } });
        const enemy = Bodies.rectangle(100, 620, 40, 60, { isStatic: true, label: 'enemy', render: { fillStyle: '#e74c3c' } });
        const treasure = Bodies.circle(300, 100, 15, { label: 'gold', render: { fillStyle: '#f1c40f', strokeStyle: '#fff', lineWidth: 2 } });

        // ピン
        const pins = [
            createPin(250, 150, 150, 10), // 水を止める
            createPin(150, 300, 150, 10), // 溶岩を止める
            createPin(250, 450, 150, 10), // 最終経路
        ];

        World.add(engine.world, [...walls, player, enemy, treasure, ...pins]);

        // 液体生成 (水と溶岩)
        for(let i=0; i<30; i++) {
            World.add(engine.world, createLiquid(50 + Math.random()*50, 50, '#00f', 'water'));
            World.add(engine.world, createLiquid(300 + Math.random()*50, 200, '#f00', 'lava'));
        }

        // --- インタラクション ---
        render.canvas.addEventListener('mousedown', (e) => {
            const rect = render.canvas.getBoundingClientRect();
            const mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            const clicked = Matter.Query.point(pins, mousePos);
            if (clicked.length > 0) {
                World.remove(engine.world, clicked[0]);
                // ピンのリストからも削除
                const idx = pins.indexOf(clicked[0]);
                if (idx > -1) pins.splice(idx, 1);
            }
        });

        // --- ループ処理 & 属性衝突ロジック ---
        Events.on(engine, 'afterUpdate', () => {
            const bodies = Composite.allBodies(engine.world);
            const waters = bodies.filter(b => b.label === 'water');
            const lavas = bodies.filter(b => b.label === 'lava');

            lavas.forEach(l => {
                // 1. 水と溶岩が触れたら「岩」にする
                waters.forEach(w => {
                    const dist = Matter.Vector.magnitude(Matter.Vector.sub(l.position, w.position));
                    if (dist < 20) {
                        const rock = createWall(l.position.x, l.position.y, 25, 25);
                        World.add(engine.world, rock);
                        World.remove(engine.world, [l, w]);
                    }
                });

                // 2. 溶岩が敵に触れたら敵が消える
                const distEnemy = Matter.Vector.magnitude(Matter.Vector.sub(l.position, enemy.position));
                if (distEnemy < 40) {
                    World.remove(engine.world, enemy);
                }

                // 3. 溶岩が自分に触れたら失敗
                const distPlayer = Matter.Vector.magnitude(Matter.Vector.sub(l.position, player.position));
                if (distPlayer < 40) {
                    document.getElementById('msg').innerText = "FAILED...";
                    document.getElementById('msg').style.display = "block";
                }
            });

            // 4. 金塊が自分に届いたら成功
            const distGold = Matter.Vector.magnitude(Matter.Vector.sub(treasure.position, player.position));
            if (distGold < 50) {
                document.getElementById('msg').innerText = "SUCCESS!";
                document.getElementById('msg').style.display = "block";
            }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
