<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>偽詐欺ゲー：流転 - Sloped Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'Arial Black', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; border: 8px solid #444; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .stage-text { color: #fff; font-size: 24px; text-shadow: 2px 2px #f39c12; }
        .msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 60px; display: none; z-index: 100; text-shadow: 4px 4px #000; }
        canvas { background: linear-gradient(180deg, #2c3e50 0%, #000 100%); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <div class="stage-text">STAGE: SLOPED TEST</div>
            <button style="pointer-events: auto;" onclick="location.reload()">RETRY</button>
        </div>
        <div id="msg" class="msg"></div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const { Engine, Render, Runner, World, Bodies, Composite, Events } = Matter;

        const width = 450;
        const height = 800;
        const engine = Engine.create();
        const render = Render.create({
            canvas: document.getElementById('canvas'),
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });

        // パーツ作成
        const createWall = (x, y, w, h, angle = 0) => Bodies.rectangle(x, y, w, h, { 
            isStatic: true, angle, render: { fillStyle: '#7f8c8d' } 
        });
        
        const createLiquid = (x, y, color, label) => Bodies.circle(x, y, 6, {
            friction: 0.01, restitution: 0.1, density: 0.002, label, render: { fillStyle: color }
        });

        const createPin = (x, y, angle) => Bodies.rectangle(x, y, 140, 12, { 
            isStatic: true, angle, label: 'pin', render: { fillStyle: '#f1c40f', strokeStyle: '#fff', lineWidth: 3 } 
        });

        // --- ステージ構築 (斜面メイン) ---
        const walls = [
            createWall(width/2, 10, width, 20), // 天井
            createWall(10, height/2, 20, height), // 左壁
            createWall(width-10, height/2, 20, height), // 右壁
            createWall(width/2, height-10, width, 20), // 床

            // V字型の貯水・貯岩タンク
            createWall(100, 150, 200, 20, Math.PI / 6),  // 左斜め上
            createWall(350, 150, 200, 20, -Math.PI / 6), // 右斜め上
            
            // 流路の斜面
            createWall(120, 350, 300, 20, Math.PI / 10), // 中段スロープ
            createWall(330, 500, 300, 20, -Math.PI / 10), // 下段スロープ
        ];

        // キャラクター
        const player = Bodies.rectangle(380, 730, 45, 65, { isStatic: true, label: 'player', render: { fillStyle: '#3498db' } });
        const enemy = Bodies.rectangle(80, 730, 45, 65, { isStatic: true, label: 'enemy', render: { fillStyle: '#e74c3c' } });
        const treasure = Bodies.circle(width/2, 50, 15, { label: 'gold', render: { fillStyle: '#f1c40f', strokeStyle: '#fff', lineWidth: 2 } });

        // ピン (斜面をせき止めるように配置)
        const pins = [
            createPin(225, 200, 0),             // 最上部のＶ字底
            createPin(150, 420, -Math.PI / 4),  // 中段スロープの出口
            createPin(300, 580, Math.PI / 4),   // 下段スロープの出口
        ];

        World.add(engine.world, [...walls, player, enemy, treasure, ...pins]);

        // 液体生成 (Ｖ字の中に溜める)
        for(let i=0; i<25; i++) {
            World.add(engine.world, createLiquid(150 + Math.random()*20, 80, '#3498db', 'water'));
            World.add(engine.world, createLiquid(280 + Math.random()*20, 80, '#e74c3c', 'lava'));
        }

        // --- クリックでピンを抜く ---
        render.canvas.addEventListener('mousedown', (e) => {
            const rect = render.canvas.getBoundingClientRect();
            const mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            const clicked = Matter.Query.point(pins, mousePos);
            if (clicked.length > 0) {
                World.remove(engine.world, clicked[0]);
                pins.splice(pins.indexOf(clicked[0]), 1);
            }
        });

        // --- 判定ロジック ---
        Events.on(engine, 'afterUpdate', () => {
            const bodies = Composite.allBodies(engine.world);
            const waters = bodies.filter(b => b.label === 'water');
            const lavas = bodies.filter(b => b.label === 'lava');

            lavas.forEach(l => {
                // 水と接触 -> 岩
                waters.forEach(w => {
                    if (Matter.Vector.magnitude(Matter.Vector.sub(l.position, w.position)) < 15) {
                        World.add(engine.world, createWall(l.position.x, l.position.y, 20, 20));
                        World.remove(engine.world, [l, w]);
                    }
                });
                // 敵を焼く
                if (Matter.Vector.magnitude(Matter.Vector.sub(l.position, enemy.position)) < 40) {
                    World.remove(engine.world, enemy);
                }
                // 自分を焼く
                if (Matter.Vector.magnitude(Matter.Vector.sub(l.position, player.position)) < 40) {
                    showMsg("FAILED...", "#e74c3c");
                }
            });

            // 金塊ゲット
            if (Matter.Vector.magnitude(Matter.Vector.sub(treasure.position, player.position)) < 50) {
                showMsg("SUCCESS!", "#f1c40f");
            }
        });

        function showMsg(text, color) {
            const m = document.getElementById('msg');
            m.innerText = text; m.style.color = color; m.style.display = "block";
        }

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
